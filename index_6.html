<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MOVE Dance Academy - Portal de Alumnas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal.css" />
</head>
<body>

<div class="floating floating1"></div>
<div class="floating floating2"></div>
<div class="floating floating3"></div>
<div class="floating floating4"></div>

<div class="container">

  <img src="logo.png" alt="MOVE Dance Academy" class="logo" />
  <div class="title">Portal de Alumnas</div>

  <!-- ============ PANTALLA 0: CARGANDO ============ -->
  <section id="pantallaCargando" class="pantalla">
    <p class="loading-text">✨ Cargando información...</p>
  </section>

  <!-- ============ PANTALLA 1: BUSCAR/ELEGIR ALUMNA ============ -->
  <section id="pantallaAlumna" class="pantalla" hidden>
    <p class="subtitulo">🔎 Busca tu nombre</p>
    <input type="text" id="buscarAlumna" class="buscador" placeholder="Escribe tu nombre..." />
    <div id="listaAlumnas" class="lista-alumnas"></div>
  </section>

  <!-- ============ PANTALLA 2: CLAVE ============ -->
  <section id="pantallaClave" class="pantalla" hidden>
    <p class="nombre-elegido" id="nombreElegido"></p>
    <p class="subtitulo">🔒 Escribe tu clave del portal</p>
    <input type="password" id="inputClave" class="input-clave" placeholder="••••" inputmode="numeric" autocomplete="off" />

    <div class="nav-botones">
      <button class="btn-secundario" id="btnAtrasClave">← No soy yo</button>
      <button class="btn-grande btn-siguiente" id="btnEntrar">Entrar →</button>
    </div>
  </section>

  <!-- ============ PANTALLA 3: PERFIL ============ -->
  <section id="pantallaPerfil" class="pantalla" hidden>
    <img id="fotoPerfil" class="foto-perfil" hidden />
    <p class="perfil-nombre" id="perfilNombre"></p>
    <div id="perfilLista" class="perfil-lista"></div>
    <button class="btn-grande btn-siguiente" id="btnSalir">← Salir</button>
  </section>

  <p class="mensaje-error" id="mensajeError"></p>

</div>

<script src="portal.js"></script>
</body>
</html>
